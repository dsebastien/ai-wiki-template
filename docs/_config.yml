title: ai-wiki-template
description: Static-site template for cross-linked markdown wikis. Tailwind v4, themable, knowledge graph, search.
url: https://dsebastien.github.io
baseurl: /ai-wiki-template

remote_theme: just-the-docs/just-the-docs

plugins:
    - jekyll-remote-theme

aux_links:
    GitHub: https://github.com/dsebastien/ai-wiki-template

search_enabled: true
search:
    heading_level: 3
    previews: 2
    preview_words_before: 5
    preview_words_after: 10

heading_anchors: true
color_scheme: light

exclude:
    - SUMMARY.md
